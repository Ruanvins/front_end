<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruan Vinícius - Portfólio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">Ruan Vinícius</div>
        <nav>
            <ul>
                <li><a href="#inicio">Início</a></li>
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#servicos">Serviços</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
        <button id="btnMenu" class="menu-mobile">☰</button>
    </header>

    <section id="inicio" class="hero">
        <h1>Bem-vindo ao Meu Site</h1>
        <p></p>

    </section>

    <section id="servicos" class="secao">
        <h2>Serviços</h2>
        <div class="cards">
            <div class="card">Criação de Sites</div>
            <div class="card">Marketing Digital</div>
            <div class="card">Consultoria</div>
        </div>
    </section>

    <section id="contato" class="secao">
        <h2>Contato</h2>
        <form id="formContato">
            <input type="text" placeholder="Seu nome" required>
            <input type="email" placeholder="Seu email" required>
            <textarea placeholder="Sua mensagem" required></textarea>
            <button type="submit">Enviar</button>
        </form>
    </section>

    <footer>
        <p>© 2026 - Todos os direitos reservados</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
